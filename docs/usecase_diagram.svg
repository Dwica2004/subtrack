<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 600" width="820" height="600" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="820" height="600" fill="#FAFAFA" rx="12"/>

  <!-- Title -->
  <text x="410" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#2D2D2D">Use Case Diagram - SubsTrack</text>
  <line x1="60" y1="48" x2="760" y2="48" stroke="#E0E0E0" stroke-width="1.5"/>

  <!-- System boundary box -->
  <rect x="220" y="65" width="510" height="490" rx="10" fill="none" stroke="#6C63FF" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="475" y="84" text-anchor="middle" font-size="13" font-weight="bold" fill="#6C63FF">SubsTrack System</text>

  <!-- ===== ACTOR ===== -->
  <!-- Actor head -->
  <circle cx="100" cy="200" r="22" fill="none" stroke="#2D2D2D" stroke-width="2"/>
  <!-- Actor body -->
  <line x1="100" y1="222" x2="100" y2="290" stroke="#2D2D2D" stroke-width="2"/>
  <!-- Actor arms -->
  <line x1="60" y1="252" x2="140" y2="252" stroke="#2D2D2D" stroke-width="2"/>
  <!-- Actor legs -->
  <line x1="100" y1="290" x2="70" y2="330" stroke="#2D2D2D" stroke-width="2"/>
  <line x1="100" y1="290" x2="130" y2="330" stroke="#2D2D2D" stroke-width="2"/>
  <!-- Actor label -->
  <text x="100" y="355" text-anchor="middle" font-size="14" font-weight="bold" fill="#2D2D2D">User</text>

  <!-- ===== USE CASES ===== -->

  <!-- UC1: Melihat Daftar Langganan -->
  <ellipse cx="475" cy="135" rx="145" ry="30" fill="#EDE9FF" stroke="#6C63FF" stroke-width="2"/>
  <text x="475" y="131" text-anchor="middle" font-size="12" fill="#2D2D2D" font-weight="bold">Melihat Daftar Langganan</text>
  <text x="475" y="147" text-anchor="middle" font-size="11" fill="#555">&amp; Total Pengeluaran Bulanan</text>

  <!-- UC2: Menambah Langganan -->
  <ellipse cx="380" cy="225" rx="120" ry="28" fill="#EDE9FF" stroke="#6C63FF" stroke-width="2"/>
  <text x="380" y="229" text-anchor="middle" font-size="12" fill="#2D2D2D" font-weight="bold">Menambah Langganan</text>

  <!-- UC3: Melihat Detail Langganan -->
  <ellipse cx="600" cy="225" rx="120" ry="28" fill="#EDE9FF" stroke="#6C63FF" stroke-width="2"/>
  <text x="600" y="229" text-anchor="middle" font-size="12" fill="#2D2D2D" font-weight="bold">Melihat Detail Langganan</text>

  <!-- UC4: Mengedit Langganan -->
  <ellipse cx="380" cy="320" rx="120" ry="28" fill="#EDE9FF" stroke="#6C63FF" stroke-width="2"/>
  <text x="380" y="324" text-anchor="middle" font-size="12" fill="#2D2D2D" font-weight="bold">Mengedit Langganan</text>

  <!-- UC5: Menghapus Langganan -->
  <ellipse cx="600" cy="320" rx="120" ry="28" fill="#EDE9FF" stroke="#6C63FF" stroke-width="2"/>
  <text x="600" y="324" text-anchor="middle" font-size="12" fill="#2D2D2D" font-weight="bold">Menghapus Langganan</text>

  <!-- UC6: Validasi Form -->
  <ellipse cx="380" cy="415" rx="120" ry="28" fill="#FFF3E0" stroke="#FF9800" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="380" y="419" text-anchor="middle" font-size="12" fill="#2D2D2D" font-weight="bold">Validasi Form Input</text>

  <!-- UC7: Menyimpan Data Permanen -->
  <ellipse cx="600" cy="415" rx="120" ry="28" fill="#FFF3E0" stroke="#FF9800" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="600" y="419" text-anchor="middle" font-size="12" fill="#2D2D2D" font-weight="bold">Menyimpan Data Permanen</text>

  <!-- UC8: Konfirmasi Hapus -->
  <ellipse cx="490" cy="510" rx="130" ry="28" fill="#FFF3E0" stroke="#FF9800" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="490" y="514" text-anchor="middle" font-size="12" fill="#2D2D2D" font-weight="bold">Konfirmasi Penghapusan</text>

  <!-- ===== ASSOCIATION LINES (Actor → Use Case) ===== -->
  <!-- Actor → UC1 -->
  <line x1="122" y1="185" x2="328" y2="140" stroke="#2D2D2D" stroke-width="1.5"/>
  <!-- Actor → UC2 -->
  <line x1="120" y1="210" x2="258" y2="220" stroke="#2D2D2D" stroke-width="1.5"/>
  <!-- Actor → UC3 -->
  <line x1="122" y1="215" x2="478" y2="218" stroke="#2D2D2D" stroke-width="1.5"/>
  <!-- Actor → UC4 -->
  <line x1="120" y1="245" x2="258" y2="310" stroke="#2D2D2D" stroke-width="1.5"/>
  <!-- Actor → UC5 -->
  <line x1="120" y1="260" x2="478" y2="308" stroke="#2D2D2D" stroke-width="1.5"/>

  <!-- ===== INCLUDE RELATIONSHIPS ===== -->
  <!-- UC2 →«include»→ UC6 (Validasi Form) -->
  <line x1="380" y1="253" x2="380" y2="387" stroke="#6C63FF" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="350" y="323" font-size="10" fill="#6C63FF">«include»</text>

  <!-- UC4 →«include»→ UC6 (Validasi Form) -->
  <line x1="365" y1="348" x2="375" y2="387" stroke="#6C63FF" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>

  <!-- UC2 →«include»→ UC7 (Simpan Data) -->
  <line x1="498" y1="225" x2="532" y2="390" stroke="#6C63FF" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="525" y="320" font-size="10" fill="#6C63FF">«include»</text>

  <!-- UC4 →«include»→ UC7 (Simpan Data) -->
  <line x1="500" y1="320" x2="540" y2="390" stroke="#6C63FF" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>

  <!-- UC5 →«include»→ UC8 (Konfirmasi Hapus) -->
  <line x1="570" y1="348" x2="530" y2="482" stroke="#6C63FF" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="522" y="420" font-size="10" fill="#6C63FF">«include»</text>

  <!-- ===== ARROW MARKER ===== -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6C63FF"/>
    </marker>
  </defs>

  <!-- ===== LEGEND ===== -->
  <rect x="60" y="420" width="140" height="120" rx="8" fill="white" stroke="#E0E0E0" stroke-width="1.5"/>
  <text x="130" y="440" text-anchor="middle" font-size="12" font-weight="bold" fill="#2D2D2D">Legend</text>
  <!-- Primary UC -->
  <ellipse cx="88" cy="462" rx="18" ry="10" fill="#EDE9FF" stroke="#6C63FF" stroke-width="1.5"/>
  <text x="112" y="466" font-size="11" fill="#2D2D2D">Use Case Utama</text>
  <!-- Secondary UC -->
  <ellipse cx="88" cy="492" rx="18" ry="10" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="112" y="496" font-size="11" fill="#2D2D2D">Use Case Pendukung</text>
  <!-- Include -->
  <line x1="72" y1="522" x2="104" y2="522" stroke="#6C63FF" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="112" y="526" font-size="11" fill="#2D2D2D">«include»</text>

</svg>
